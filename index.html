<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A local Internet Skills glossary and revision games for QQI Level 3 learners.">
  <title>Internet Skills Hub</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      const saved = localStorage.getItem("internet-skills-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
    }());
  </script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to learning content</a>

  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="#home" aria-label="Internet Skills Hub home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M3 12h18M12 3c2.7 2.5 4.1 5.5 4.1 9S14.7 18.5 12 21M12 3C9.3 5.5 7.9 8.5 7.9 12S9.3 18.5 12 21"></path>
          </svg>
        </span>
        <span>Internet Skills <strong>Hub</strong></span>
      </a>

      <button class="menu-toggle" id="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span class="sr-only">Open navigation</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16"></path>
        </svg>
      </button>

      <nav class="site-nav" id="site-nav" aria-label="Main navigation">
        <a href="#home" data-route="home">Home</a>
        <a href="#glossary" data-route="glossary">Glossary</a>
        <a href="#quiz" data-route="quiz">Quiz</a>
        <a href="#match" data-route="match">Match</a>
        <a href="#sort" data-route="sort">Safe or Risky</a>
      </nav>

      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch colour theme">
        <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.5 15.2A8.5 8.5 0 0 1 8.8 3.5 8.7 8.7 0 1 0 20.5 15.2Z"></path>
        </svg>
        <span id="theme-label">Dark mode</span>
      </button>
    </div>
  </header>

  <main id="main-content" tabindex="-1">
    <div id="app" aria-live="polite"></div>
  </main>

  <footer class="site-footer">
    <div>
      <strong>Internet Skills Hub</strong>
      <span>Local revision activities for QQI Level 3 learners</span>
    </div>
    <button id="reset-progress" class="text-button" type="button">Reset my progress</button>
  </footer>

  <script src="data/glossary-data.js"></script>
  <script src="data/quiz-data.js"></script>
  <script src="data/scenario-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
